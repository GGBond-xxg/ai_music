plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')

configurations.configureEach {
    resolutionStrategy {
        force 'androidx.core:core:1.13.1'
        force 'androidx.core:core-ktx:1.13.1'
        force 'androidx.browser:browser:1.8.0'
    }
}
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.chatlee.aimusic"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(17)
        }
    }

    kotlin {
        jvmToolchain(17)
    }

    defaultConfig {
        applicationId = "com.chatlee.aimusic"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // 只打包我们声明过的资源，减小 APK
        resourceConfigurations.addAll(["en", "zh", "zh-rCN", "zh-rTW", "zh-rHK", "zh-rMO"])
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? rootProject.file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }


    // When this package is extracted over an older spotoolfy folder, the old
    // Kotlin source directory may remain on disk and Gradle will try to compile it.
    // Exclude the previous package path so stale com.gojyuplusone sources cannot
    // break the new com.chatlee.aimusic build.
    sourceSets {
        main {
            java {
                exclude '**/gojyuplusone/**'
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
    
            // 先关闭 R8，避免 Play Core 缺失类导致打包失败
            minifyEnabled false
            shrinkResources false
    
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.browser:browser:1.8.0'
    implementation 'androidx.core:core:1.13.1'
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.media:media:1.7.0'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.palette:palette-ktx:1.0.0'
    implementation 'com.github.bumptech.glide:glide:4.12.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.12.0'


    // Jetify annotations
    implementation 'androidx.annotation:annotation:1.7.1'
}

repositories {
    maven { url "https://jitpack.io" }
    maven { url 'https://maven.google.com' }
    google()
    mavenCentral()
}

flutter {
    source = "../.."
}
