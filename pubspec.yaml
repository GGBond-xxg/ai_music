name: fresh_music
description: A local/NAS/WebDAV/Emby music player built with Flutter Material 3 and GetX.
publish_to: 'none'
version: 0.2.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # GetX state management / route / dependency injection
  get: ^4.7.2

  # Persistence
  shared_preferences: ^2.3.2

  # Audio playback
  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7

  # Files / network sources
  file_picker: ^8.1.4
  path: ^1.9.0
  path_provider: ^2.1.4
  dio: ^5.7.0
  crypto: ^3.0.6
  webdav_client: ^1.2.2
  permission_handler: ^11.3.1

  # UI
  dynamic_color: ^1.8.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  google_fonts: ^6.2.1
  lpinyin: ^2.0.3
  palette_generator: ^0.3.3+6
  window_manager: ^0.4.3

  # Metadata / lyrics helpers
  audio_metadata_reader: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
  #   - assets/images/
