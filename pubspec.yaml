name: music
description: "Get things you need for music."
publish_to: "none"

version: 1.0.2+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  logger: ^2.4.0
  intl: ^0.20.2
  path: ^1.9.0
  cupertino_icons: ^1.0.8
  flutter_secure_storage: 9.2.4
  http: ^1.3.0
  crypto: ^3.0.6
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  media_kit: ^1.2.6
  media_kit_libs_audio: ^1.0.7
  dio: ^5.7.0
  webdav_client: ^1.2.2
  permission_handler: 11.3.1
  audio_metadata_reader: ^1.6.0
  shared_preferences: 2.3.3
  url_launcher: 6.3.1
  collection: ^1.19.0
  sqflite:
  path_provider: 2.1.4
  flutter_dotenv: ^5.1.0
  flutter_cache_manager: 3.4.1
  rxdart: 0.28.0
  get_it: ^7.7.0
  flutter_native_splash: ^2.4.0
  share_plus: 10.1.4
  file_picker: 8.3.7
  flutter_staggered_grid_view: ^0.7.0
  encrypt: ^5.0.3
  pointycastle: ^3.9.0
  html_unescape: ^2.0.0
  flutter_markdown: ^0.7.4+3
  material_color_utilities: ^0.13.0
  image_gallery_saver_plus: 4.0.1
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/examples/
    - assets/icons/app_icon_monochrome.png

flutter_launcher_icons:
  android: true
  ios: true

  image_path_android: "assets/icons/app_icon_ios.png"
  image_path_ios: "assets/icons/app_icon_ios.png"

  adaptive_icon_background: "#F6FBFA"
  adaptive_icon_foreground: "assets/icons/app_icon_ios.png"
  adaptive_icon_foreground_inset: 18

  adaptive_icon_monochrome: "assets/icons/app_icon_monochrome.png"

  min_sdk_android: 23
  remove_alpha_ios: true
